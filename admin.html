<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора - ДВССК</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="header">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>Дальневосточный судостроительный колледж</h1>
                    <p>Панель администратора</p>
                </div>
                <div style="display: flex; gap: 10px;">
                    <a href="./users.html" class="btn btn-secondary"><i class="fas fa-users"></i> Пользователи</a>
                    <a href="./logout.html" class="btn btn-secondary" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            <div class="admin-stats" id="stats">
                <!-- Статистика будет вставлена через JS -->
            </div>

            <h3 style="margin-bottom: 20px; font-size: 24px; color: #0f3b7a; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-list"></i> Все заявки
            </h3>
            
            <div class="requests-table">
                <table>
                    <thead>
                        <tr>
                            <th>Номер</th>
                            <th>Дата</th>
                            <th>Студент</th>
                            <th>Группа</th>
                            <th>Тип</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="requests-table-body">
                        <!-- Заявки будут вставлены через JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p class="footer-address"><i class="fas fa-map-pin"></i> г. Большой Камень, ул. Ленина, 22 | <i class="fas fa-door-open"></i> Учебная часть: каб. 9</p>
            <p><i class="far fa-copyright"></i> 2026 КГА ПОУ «Дальневосточный судостроительный колледж»</p>
        </div>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>

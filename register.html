<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - ДВССК</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="auth-page">
    <div class="header">
        <div class="container">
            <div style="text-align: center;">
                <h1>Дальневосточный судостроительный колледж</h1>
                <p>Электронный заказ справок об обучении</p>
            </div>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>Регистрация</h2>
                <p>Создайте аккаунт для заказа справок</p>
            </div>
            
            <div id="error-message" style="display: none; background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 12px; margin-bottom: 20px;"></div>
            
            <form id="register-form">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> ФИО полностью</label>
                    <input type="text" class="form-control" id="fullname" required placeholder="Иванов Иван Иванович">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" class="form-control" id="email" required autocomplete="email" placeholder="ivanov@dvssk.ru">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-user-circle"></i> Логин</label>
                    <input type="text" class="form-control" id="username" required autocomplete="username" placeholder="ivanov_ii">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" class="form-control" id="password" required minlength="8" autocomplete="new-password" placeholder="минимум 8 символов">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-users"></i> Группа</label>
                    <input type="text" class="form-control" id="group" required placeholder="например: 111">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-user-plus"></i> Зарегистрироваться</button>
            </form>
            
            <div class="auth-footer">
                <a href="./login.html"><i class="fas fa-sign-in-alt"></i> Уже есть аккаунт</a>
                <span>|</span>
                <a href="./index.html"><i class="fas fa-home"></i> На главную</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p class="footer-address"><i class="fas fa-map-pin"></i> г. Большой Камень, ул. Ленина, 22 | <i class="fas fa-door-open"></i> Учебная часть: каб. 9</p>
            <p><i class="far fa-copyright"></i> 2026 КГА ПОУ «Дальневосточный судостроительный колледж»</p>
        </div>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - ДВССК</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="header">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>Дальневосточный судостроительный колледж</h1>
                    <p>Личный кабинет студента</p>
                </div>
                <a href="./logout.html" class="btn btn-secondary" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="welcome-section" id="user-info">
            <!-- Данные пользователя будут вставлены через JS -->
        </div>

        <div style="margin-bottom: 30px; text-align: right;">
            <a href="./create-request.html" class="btn btn-primary"><i class="fas fa-plus-circle"></i> Новая заявка</a>
        </div>

        <h3 style="margin-bottom: 20px;"><i class="fas fa-history"></i> Мои заявки</h3>
        
        <div id="requests-list">
            <!-- Список заявок будет вставлен через JS -->
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p class="footer-address"><i class="fas fa-map-pin"></i> г. Большой Камень, ул. Ленина, 22 | <i class="fas fa-door-open"></i> Учебная часть: каб. 9</p>
            <p><i class="far fa-copyright"></i> 2026 КГА ПОУ «Дальневосточный судостроительный колледж»</p>
        </div>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
